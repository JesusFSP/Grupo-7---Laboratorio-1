<!DOCTYPE html>
<html>
<head>
    <title>Agenda</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/lab03/css/style.css">
</head>
<body>

<div class="contenedor">

    <!-- PANEL IZQUIERDO -->
    <div class="panel">
        <h2>✏️ Crear / Editar Evento</h2>

        <form id="formEvento">
            <input type="text" id="fecha" placeholder="AAAA.MM.DD" required>
            <input type="text" id="hora" placeholder="HH.MM" required>
            <textarea id="descripcion" placeholder="Descripcion"></textarea>

            <button type="submit" id="btnGuardar">Crear</button>
        </form>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel eventos">
        <h2>📋 Eventos</h2>
        <div id="listaEventos"></div>
    </div>

</div>

<script src="/lab03/js/agenda.js"></script>
</body>
</html>
