<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte Técnico | Grupo 7</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=80&q=80" alt="Regresar al Inicio" class="logo-tech">
            </a>
            <h1>Centro de Tickets de Ingeniería</h1>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <h2>Enviar Reporte de Incidencia</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="nombre">Ingeniero Remitente:</label>
                    <input type="text" id="nombre" required placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label for="mensaje">Detalles Técnicos:</label>
                    <textarea id="mensaje" rows="5" required placeholder="Describa el problema o consulta..."></textarea>
                </div>
                <button type="submit" class="btn-nav" style="width: 100%; cursor: pointer;">Registrar Ticket</button>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Escuela Profesional de Ingeniería de Sistemas - UNSA</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
